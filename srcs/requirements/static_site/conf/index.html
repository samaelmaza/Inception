<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sam's Inception Portfolio</title>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Outfit', sans-serif;
		}

		body {
			background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
			color: white;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		.card {
			background: rgba(255, 255, 255, 0.05);
			backdrop-filter: blur(15px);
			-webkit-backdrop-filter: blur(15px);
			border: 1px solid rgba(255, 255, 255, 0.1);
			border-radius: 20px;
			padding: 3rem;
			max-width: 600px;
			text-align: center;
			box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
			transform: translateY(0);
			transition: transform 0.3s ease, box-shadow 0.3s ease;
		}

		.card:hover {
			transform: translateY(-10px);
			box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.4);
		}

		.avatar {
			width: 120px;
			height: 120px;
			background: linear-gradient(45deg, #00f2fe, #4facfe);
			border-radius: 50%;
			margin: 0 auto 1.5rem auto;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 3rem;
			font-weight: 700;
			color: #fff;
			box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
			animation: pulse 2s infinite ease-in-out;
		}

		h1 {
			font-size: 2.5rem;
			font-weight: 700;
			margin-bottom: 0.5rem;
			background: -webkit-linear-gradient(#fff, #b3e5fc);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		h2 {
			font-size: 1.2rem;
			font-weight: 300;
			color: #81d4fa;
			margin-bottom: 2rem;
			letter-spacing: 2px;
			text-transform: uppercase;
		}

		p {
			font-size: 1.1rem;
			line-height: 1.6;
			color: #b0bec5;
			margin-bottom: 2rem;
		}

		.badge {
			display: inline-block;
			background: rgba(79, 172, 254, 0.2);
			color: #4facfe;
			padding: 0.5rem 1rem;
			border-radius: 30px;
			font-size: 0.9rem;
			font-weight: 500;
			border: 1px solid rgba(79, 172, 254, 0.3);
			margin: 0 0.5rem;
			transition: all 0.3s ease;
		}

		.badge:hover {
			background: rgba(79, 172, 254, 0.4);
			transform: scale(1.05);
		}

		.badges {
			display: flex;
			justify-content: center;
			gap: 10px;
			flex-wrap: wrap;
		}

		@keyframes pulse {
			0% {
				box-shadow: 0 0 0 0 rgba(79, 172, 254, 0.4);
			}

			70% {
				box-shadow: 0 0 0 20px rgba(79, 172, 254, 0);
			}

			100% {
				box-shadow: 0 0 0 0 rgba(79, 172, 254, 0);
			}
		}
	</style>
</head>

<body>

	<div class="card">
		<div class="avatar">SR</div>
		<h1>Samael Reffers</h1>
		<h2>DevOps Engineer | 42 Student</h2>

		<p>Welcome to my static website! This web server is running on Python 3 directly from an isolated Debian
			Docker container. No NGINX, no Apache, just pure DevOps magic!</p>

		<div class="badges">
			<span class="badge">Docker</span>
			<span class="badge">Inception</span>
			<span class="badge">Linux</span>
			<span class="badge">Python</span>
		</div>
	</div>

</body>

</html>
